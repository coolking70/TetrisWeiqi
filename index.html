<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俄罗斯方块棋 Tetris Weiqi</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  overflow-x: hidden;
}

/* Header */
.header { text-align: center; padding: 10px 0 4px; }
.header h1 {
  font-size: 24px;
  background: linear-gradient(90deg, #4fc3f7, #e040fb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 4px;
}
.header .subtitle { font-size: 11px; color: #666; letter-spacing: 2px; }

/* Top bar: settings + controls */
.top-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  padding: 6px 10px;
  max-width: 800px;
}
.top-bar button {
  padding: 5px 14px;
  font-size: 13px;
  border-radius: 6px;
}
.top-bar select {
  background: #16213e; color: #e0e0e0; border: 1px solid #333;
  border-radius: 6px; padding: 4px 6px; font-size: 12px;
}
.top-bar label { font-size: 12px; color: #999; }
button {
  background: #16213e;
  color: #e0e0e0;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
button:hover { background: #1a3a5c; border-color: #4fc3f7; }
button:active { transform: scale(0.96); }
button.primary { background: #4fc3f7; color: #1a1a2e; font-weight: bold; }
button.primary:hover { background: #81d4fa; }
button.mode-btn.selected { background: #4fc3f7; color: #1a1a2e; border-color: #4fc3f7; font-weight: bold; }
button.rotate-btn { background: #2d1b4e; border-color: #7c4dff; }
button.skip-btn { background: #4a1a1a; border-color: #c62828; }

/* Status */
.status-bar {
  text-align: center; font-size: 14px; min-height: 20px;
  color: #fdd835; padding: 4px 0;
}

/* Main game area */
.game-area {
  display: flex;
  gap: 10px;
  align-items: stretch;
  justify-content: center;
  padding: 0 6px;
}

/* Side panels */
.panel {
  width: 140px;
  min-width: 140px;
  background: #16213e;
  border-radius: 10px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: box-shadow 0.3s;
}
.panel h2 { font-size: 14px; text-align: center; margin: 0; }
.panel.p1 { border: 2px solid #4fc3f744; }
.panel.p2 { border: 2px solid #e040fb44; }
.panel.p1.active { border-color: #4fc3f7; box-shadow: 0 0 16px rgba(79,195,247,0.3); }
.panel.p2.active { border-color: #e040fb; box-shadow: 0 0 16px rgba(224,64,251,0.3); }

.score-row { display: flex; justify-content: space-between; align-items: center; }
.score-label { font-size: 11px; color: #888; }
.score-value { font-size: 22px; font-weight: bold; }
.p1 .score-value { color: #4fc3f7; }
.p2 .score-value { color: #e040fb; }

.preview-box {
  background: #0f1a30;
  border-radius: 6px;
  padding: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80px;
}
.preview-canvas { display: block; }

/* Board */
.board-wrapper {
  background: #0d1117;
  border-radius: 10px;
  padding: 6px;
  box-shadow: 0 0 24px rgba(0,0,0,0.5);
  flex-shrink: 0;
}
#boardCanvas {
  display: block;
  cursor: crosshair;
  border-radius: 3px;
}

/* Footer */
.footer {
  display: flex; gap: 16px; justify-content: center;
  font-size: 11px; color: #555; padding: 6px 0; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 3px; }
.legend-swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #444; }

/* Game over overlay */
.overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
.overlay.show { display: flex; }
.dialog {
  background: #16213e;
  border-radius: 16px;
  padding: 28px;
  text-align: center;
  max-width: 360px;
  border: 2px solid #4fc3f7;
}
.dialog h2 { font-size: 20px; margin-bottom: 12px; }
.dialog .result { font-size: 36px; margin: 12px 0; }
.dialog .detail { color: #999; font-size: 13px; margin-bottom: 16px; white-space: pre-line; }

/* Mobile controls */
.mobile-controls {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 0 12px;
}
.mobile-row { display: flex; gap: 6px; }
.mobile-btn {
  width: 56px; height: 48px;
  font-size: 20px;
  background: #16213e;
  color: #e0e0e0;
  border: 1px solid #444;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.mobile-btn:active { background: #2a4a6e; transform: scale(0.93); }
.mobile-btn.place-btn {
  width: 64px;
  background: #4fc3f7; color: #1a1a2e; font-weight: bold; font-size: 15px;
  border-color: #4fc3f7;
}
.mobile-btn.rotate-m { background: #2d1b4e; border-color: #7c4dff; font-size: 14px; width: 64px; }
.mobile-btn.skip-m { background: #4a1a1a; border-color: #c62828; font-size: 14px; width: 64px; }

.desktop-hint { display: inline; }
.mobile-hint { display: none; }

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 20px; }
  .game-area { flex-direction: column; align-items: center; gap: 6px; }
  .panel { width: 100%; max-width: 360px; flex-direction: row; flex-wrap: wrap; justify-content: space-around; min-width: auto; padding: 8px; }
  .panel h2 { width: 100%; font-size: 13px; }
  .preview-box { min-height: 60px; }
  .score-value { font-size: 18px; }
  .top-bar { padding: 4px 6px; gap: 5px; }
  .top-bar button { padding: 4px 10px; font-size: 12px; }
  .mobile-controls { display: flex; }
  .desktop-hint { display: none; }
  .mobile-hint { display: inline; }
}

@media (hover: none) and (pointer: coarse) {
  .mobile-controls { display: flex; }
  .desktop-hint { display: none; }
  .mobile-hint { display: inline; }
}
</style>
</head>
<body>

<div class="header">
  <h1>俄罗斯方块棋</h1>
  <div class="subtitle">Tetris meets Weiqi</div>
</div>

<div class="top-bar">
  <button class="mode-btn selected" id="btnPvAI" onclick="setMode('pvai')">人机</button>
  <button class="mode-btn" id="btnPvP" onclick="setMode('pvp')">双人</button>
  <label>棋盘</label>
  <select id="boardSizeSelect" onchange="changeBoardSize()">
    <option value="10" selected>10x10</option>
    <option value="13">13x13</option>
    <option value="15">15x15</option>
  </select>
  <label>AI</label>
  <select id="aiLevelSelect">
    <option value="1">简单</option>
    <option value="2" selected>普通</option>
    <option value="3">困难</option>
    <option value="4">神经网络</option>
    <option value="5">神经网络+MCTS</option>
  </select>
  <span id="mctsSliderWrap" style="display:none;">
    <input type="range" id="mctsSimsSlider" min="10" max="200" step="10" value="40"
      style="width:80px;vertical-align:middle;" oninput="updateMctsLabel()">
    <label id="mctsSimsLabel" style="font-size:12px;color:#aaa;">40次</label>
  </span>
  <button class="primary" onclick="startGame()">开始游戏</button>
  <button class="rotate-btn" onclick="rotatePiece()">旋转(R)</button>
  <button class="skip-btn" onclick="skipTurn()">跳过</button>
  <button onclick="saveGame()" style="background:#1a3a1a;border:1px solid #4caf50;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;">存档</button>
  <button onclick="loadGame()" style="background:#1a2a3a;border:1px solid #42a5f5;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;">读档</button>
  <button onclick="document.getElementById('replayFileInput').click()" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;">回放棋谱</button>
  <input type="file" id="replayFileInput" accept=".txt" style="display:none;" onchange="loadReplayFile(event)">
  <button id="btnSound" onclick="toggleSound()" style="background:#1a1a2e;border:1px solid #555;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:16px;">🔊</button>
  <button id="btnBgm" onclick="toggleBgm()" style="background:#1a1a2e;border:1px solid #555;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:16px;">🎵</button>
</div>

<div class="status-bar" id="statusBar">点击"开始游戏"开始</div>

<div class="game-area">
  <div class="panel p1" id="panelP1">
    <h2>玩家 1 (蓝)</h2>
    <div class="score-row">
      <span class="score-label">方块数</span>
      <span class="score-value" id="scoreP1">0</span>
    </div>
    <div class="score-label">当前方块</div>
    <div class="preview-box"><canvas class="preview-canvas" id="previewP1" width="90" height="90"></canvas></div>
  </div>

  <div class="board-wrapper">
    <canvas id="boardCanvas"></canvas>
  </div>

  <div class="panel p2" id="panelP2">
    <h2>玩家 2 (紫)</h2>
    <div class="score-row">
      <span class="score-label">方块数</span>
      <span class="score-value" id="scoreP2">0</span>
    </div>
    <div class="score-label">当前方块</div>
    <div class="preview-box"><canvas class="preview-canvas" id="previewP2" width="90" height="90"></canvas></div>
  </div>
</div>

<div class="footer">
  <div class="legend-item"><div class="legend-swatch" style="background:#4fc3f7"></div> 玩家1</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#e040fb"></div> 玩家2</div>
  <span class="desktop-hint">鼠标预览 | 点击落子 | R/右键旋转 | 方向键微调</span>
  <span class="mobile-hint">触屏拖动预览 | 松手落子 | 点击方块预览旋转</span>
</div>

<!-- Mobile touch controls -->
<div class="mobile-controls" id="mobileControls">
  <button class="mobile-btn" ontouchstart="movePieceDir(-1,0)" onclick="movePieceDir(-1,0)">&#9650;</button>
  <div class="mobile-row">
    <button class="mobile-btn" ontouchstart="movePieceDir(0,-1)" onclick="movePieceDir(0,-1)">&#9664;</button>
    <button class="mobile-btn place-btn" ontouchstart="confirmPlace()" onclick="confirmPlace()">落子</button>
    <button class="mobile-btn" ontouchstart="movePieceDir(0,1)" onclick="movePieceDir(0,1)">&#9654;</button>
  </div>
  <button class="mobile-btn" ontouchstart="movePieceDir(1,0)" onclick="movePieceDir(1,0)">&#9660;</button>
  <div class="mobile-row" style="margin-top:6px">
    <button class="mobile-btn rotate-m" ontouchstart="rotatePiece()" onclick="rotatePiece()">旋转</button>
    <button class="mobile-btn skip-m" ontouchstart="skipTurn()" onclick="skipTurn()">跳过</button>
  </div>
</div>

<div class="overlay" id="gameOverOverlay">
  <div class="dialog">
    <h2 id="gameOverTitle">游戏结束</h2>
    <div class="result" id="gameOverResult"></div>
    <div class="detail" id="gameOverDetail"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="primary" onclick="exportGameRecord()">导出棋谱</button>
      <button class="primary" onclick="closeOverlay(); startReplay();">回放</button>
      <button class="primary" onclick="closeOverlay(); startGame();">再来一局</button>
    </div>
  </div>
</div>

<!-- Replay control bar -->
<div id="replayBar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;border-top:2px solid #7c4dff;padding:8px 12px;z-index:200;text-align:center;">
  <button onclick="replayStep(-Infinity)" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">⏮</button>
  <button onclick="replayStep(-1)" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">◀</button>
  <button id="replayPlayBtn" onclick="toggleReplayAuto()" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">▶</button>
  <button onclick="replayStep(1)" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">▶</button>
  <button onclick="replayStep(Infinity)" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">⏭</button>
  <input type="range" id="replaySlider" min="0" max="1" value="0" style="width:120px;vertical-align:middle;margin:0 8px;" oninput="replaySeek(this.value)">
  <span id="replayInfo" style="color:#aaa;font-size:12px;">0/0</span>
  <button onclick="exitReplay()" style="background:#3d1a1a;border:1px solid #e57373;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;margin-left:12px;">退出回放</button>
</div>

<script>
// ============================================================
// Constants
// ============================================================
const EMPTY = 0, P1 = 1, P2 = 2, DEAD1 = 3, DEAD2 = 4;
const P1_COLOR = '#4fc3f7', P1_DARK = '#2980b9';
const P2_COLOR = '#e040fb', P2_DARK = '#9c27b0';
const GRID_COLOR = '#1e2d3d', BG_COLOR = '#0d1117';
const GHOST_ALPHA = 0.35;

// Standard 7 Tetris pieces as [row, col] offsets
const PIECE_SHAPES = {
  I: [[0,0],[0,1],[0,2],[0,3]],
  O: [[0,0],[0,1],[1,0],[1,1]],
  T: [[0,0],[0,1],[0,2],[1,1]],
  S: [[0,1],[0,2],[1,0],[1,1]],
  Z: [[0,0],[0,1],[1,1],[1,2]],
  L: [[0,0],[1,0],[2,0],[2,1]],
  J: [[0,1],[1,1],[2,0],[2,1]]
};
const PIECE_NAMES = Object.keys(PIECE_SHAPES);

// ============================================================
// State
// ============================================================
let BOARD_SIZE = 10;
let CELL_SIZE = 32;
let board = [];
let currentPlayer = P1;
let pieces = { [P1]: null, [P2]: null };
let gameActive = false;
let gameMode = 'pvai';
let ghostPos = null;
let rotation = 0;
let skipCount = 0;
let bag = []; // shared bag7
let moveHistory = []; // 棋谱记录
let lastPlacedMove = null; // { player, cells: [[r,c],...] } — 上一手落子位置
let cachedLegalMoves = null; // { rotation, moves: [{row,col,cells}] } — 当前旋转的合法位置缓存

let boardCanvas, boardCtx, previewP1, prevCtx1, previewP2, prevCtx2;

// Animation state
let animations = []; // { type, cells, color, startTime, duration }
let animFrameId = null;

// Audio system
const SFX = {
  place: null, capture: null, clear: null,
  rotate: null, gameOver: null, gameStart: null,
};
let bgm = null;
let soundEnabled = true;
let bgmEnabled = true;

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Procedural sound effects (no file needed)
function playTone(freq, duration, type, vol) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}

function playIllegalSfx() {
  // Low buzzer: two quick dissonant tones
  playTone(150, 0.15, 'square', 0.2);
  setTimeout(() => playTone(120, 0.15, 'square', 0.15), 80);
}

function playSkipSfx() {
  // Gentle descending two-note
  playTone(440, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(330, 0.2, 'sine', 0.2), 100);
}

function initAudio() {
  SFX.place     = new Audio('sounds/place.mp3');
  SFX.capture   = new Audio('sounds/capture.mp3');
  SFX.clear     = new Audio('sounds/clear.mp3');
  SFX.rotate    = new Audio('sounds/rotate.mp3');
  SFX.gameOver  = new Audio('sounds/gameover.mp3');
  SFX.gameStart = new Audio('sounds/gamestart.mp3');
  for (const k of Object.keys(SFX)) {
    SFX[k].volume = 0.5;
    SFX[k].preload = 'auto';
  }
  bgm = new Audio('sounds/bgm.mp3');
  bgm.loop = true;
  bgm.volume = 0.3;
  bgm.preload = 'auto';
}

function playSfx(name) {
  if (!soundEnabled || !SFX[name]) return;
  try {
    const s = SFX[name];
    s.currentTime = 0;
    s.play().catch(() => {});
  } catch (e) {}
}

function playBgm() {
  if (!bgmEnabled || !bgm) return;
  bgm.play().catch(() => {});
}

function stopBgm() {
  if (!bgm) return;
  bgm.pause();
  bgm.currentTime = 0;
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('btnSound').textContent = soundEnabled ? '🔊' : '🔇';
}

function toggleBgm() {
  bgmEnabled = !bgmEnabled;
  document.getElementById('btnBgm').textContent = bgmEnabled ? '🎵' : '🎵✕';
  if (bgmEnabled && gameActive) playBgm();
  else stopBgm();
}

// ONNX Neural Network AI
let onnxSession = null;
let onnxLoading = false;
const ONNX_MODEL_PATH = 'checkpoints_m5_mps/best_browser.onnx';
const INPUT_CHANNELS = 22;

// ============================================================
// Init
// ============================================================
function init() {
  boardCanvas = document.getElementById('boardCanvas');
  boardCtx = boardCanvas.getContext('2d');
  previewP1 = document.getElementById('previewP1');
  prevCtx1 = previewP1.getContext('2d');
  previewP2 = document.getElementById('previewP2');
  prevCtx2 = previewP2.getContext('2d');

  boardCanvas.addEventListener('mousemove', onMouseMove);
  boardCanvas.addEventListener('mouseleave', () => { ghostPos = null; render(); });
  boardCanvas.addEventListener('click', onBoardClick);
  boardCanvas.addEventListener('contextmenu', (e) => { e.preventDefault(); rotatePiece(); });
  document.addEventListener('keydown', onKeyDown);

  // Touch events (board)
  boardCanvas.addEventListener('touchstart', onTouchStart, { passive: false });
  boardCanvas.addEventListener('touchmove', onTouchMove, { passive: false });
  boardCanvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Tap on own piece preview = rotate piece (touch devices)
  document.addEventListener('touchstart', (e) => {
    if (!gameActive || (gameMode === 'pvai' && currentPlayer === P2)) return;
    const t = e.target;
    const myPreview = currentPlayer === P1 ? previewP1 : previewP2;
    if (t === myPreview || t.closest('.preview-box')?.contains(myPreview)) {
      rotatePiece();
    }
  });

  resizeBoard();
  render();
}

function resizeBoard() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const isMobile = vw <= 600 || (matchMedia('(hover:none) and (pointer:coarse)').matches);
  const availW = isMobile ? vw - 24 : Math.min(vw - 320, 560);
  const availH = isMobile ? vh - 340 : vh - 200;
  CELL_SIZE = Math.max(18, Math.min(40, Math.floor(Math.min(availW, availH) / BOARD_SIZE)));
  boardCanvas.width = BOARD_SIZE * CELL_SIZE;
  boardCanvas.height = BOARD_SIZE * CELL_SIZE;
}

function createBoard() {
  board = [];
  for (let r = 0; r < BOARD_SIZE; r++) {
    board.push(new Array(BOARD_SIZE).fill(EMPTY));
  }
}

function setMode(mode) {
  gameMode = mode;
  document.getElementById('btnPvAI').classList.toggle('selected', mode === 'pvai');
  document.getElementById('btnPvP').classList.toggle('selected', mode === 'pvp');
  document.getElementById('panelP2').querySelector('h2').textContent =
    mode === 'pvai' ? 'AI (紫)' : '玩家 2 (紫)';
}

function changeBoardSize() {
  BOARD_SIZE = parseInt(document.getElementById('boardSizeSelect').value);
  resizeBoard();
  createBoard();
  render();
}

function startGame() {
  if (replayMode) exitReplay();
  BOARD_SIZE = parseInt(document.getElementById('boardSizeSelect').value);
  resizeBoard();
  createBoard();
  currentPlayer = P1;
  rotation = 0;
  skipCount = 0;
  bag = [];
  refillBag();
  moveHistory = [];
  lastPlacedMove = null;
  gameActive = true;
  generatePiece(P1);
  generatePiece(P2);
  updatePanels();
  setStatus(playerName(P1) + ' 的回合');
  updateLegalMovesCache();
  render();
  playSfx('gameStart');
  playBgm();
}

// ============================================================
// Pieces
// ============================================================
function refillBag() {
  bag = [...PIECE_NAMES];
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
}

function generatePiece(player) {
  if (bag.length === 0) refillBag();
  const name = bag.pop();
  pieces[player] = { name, cells: PIECE_SHAPES[name].map(c => [...c]) };
}

function bagPieceCounts() {
  const counts = {};
  for (const n of PIECE_NAMES) counts[n] = 0;
  for (const n of bag) counts[n]++;
  return counts;
}

function getRotatedCells(cells, rot) {
  let c = cells.map(p => [...p]);
  for (let i = 0; i < (rot % 4); i++) {
    c = c.map(([r, cl]) => [cl, -r]);
  }
  let minR = Infinity, minC = Infinity;
  c.forEach(([r, cl]) => { minR = Math.min(minR, r); minC = Math.min(minC, cl); });
  return c.map(([r, cl]) => [r - minR, cl - minC]);
}

function getCurrentCells() {
  if (!pieces[currentPlayer]) return [];
  return getRotatedCells(pieces[currentPlayer].cells, rotation);
}

function updateLegalMovesCache() {
  if (!gameActive || !pieces[currentPlayer]) { cachedLegalMoves = null; return; }
  const cells = getCurrentCells();
  const moves = [];
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (isLegalMove(cells, r, c, currentPlayer)) {
        moves.push({ row: r, col: c });
      }
    }
  }
  cachedLegalMoves = { rotation, cells, moves };
}

function getPieceBounds(cells) {
  let maxR = 0, maxC = 0;
  cells.forEach(([r, c]) => { maxR = Math.max(maxR, r); maxC = Math.max(maxC, c); });
  return { rows: maxR + 1, cols: maxC + 1 };
}

// ============================================================
// Placement Validation
// ============================================================
// 围棋式规则：围杀后直接移除变空格，不产生死区
function cellAllowedFor(cell, player) {
  return cell === EMPTY;
}

function canPlace(cells, row, col, player) {
  for (const [dr, dc] of cells) {
    const r = row + dr, c = col + dc;
    if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) return false;
    if (!cellAllowedFor(board[r][c], player)) return false;
  }
  return true;
}

// 完整合法性检查：canPlace + 自杀禁手
// 模拟落子 → 提对方 → 检查己方是否有气 → 还原
function isLegalMove(cells, row, col, player) {
  if (!canPlace(cells, row, col, player)) return false;

  // 保存棋盘快照
  const snapshot = board.map(r => [...r]);

  // 模拟落子（覆盖死区）
  for (const [dr, dc] of cells) {
    board[row + dr][col + dc] = player;
  }

  // 先提对方无气之子
  const opponent = player === P1 ? P2 : P1;
  captureGroupsOf(opponent);

  // 检查己方是否有无气组（自杀检测）
  const selfDead = hasDeadGroups(player);

  // 还原棋盘
  for (let r = 0; r < BOARD_SIZE; r++)
    for (let c = 0; c < BOARD_SIZE; c++)
      board[r][c] = snapshot[r][c];

  return !selfDead; // 自杀则不合法
}

function canPlaceAnywhere(player, pieceCells) {
  for (let rot = 0; rot < 4; rot++) {
    const cells = getRotatedCells(pieceCells, rot);
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (isLegalMove(cells, r, c, player)) return true;
      }
    }
  }
  return false;
}

// ============================================================
// Go Capture Logic
// ============================================================
function getGroup(row, col, visited) {
  const owner = board[row][col];
  if (owner !== P1 && owner !== P2) return null;
  const group = [];
  const liberties = new Set();
  const stack = [[row, col]];
  const key = (r, c) => r * BOARD_SIZE + c;
  visited.add(key(row, col));

  while (stack.length) {
    const [r, c] = stack.pop();
    group.push([r, c]);
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue;
      const k = key(nr, nc);
      if (visited.has(k)) continue;
      const cell = board[nr][nc];
      if (cell === EMPTY) {
        liberties.add(k);
      } else if (cell === owner) {
        visited.add(k);
        stack.push([nr, nc]);
      }
    }
  }
  return { owner, group, liberties: liberties.size };
}

// 提掉指定方无气的棋组，返回提子数
function captureGroupsOf(target) {
  const visited = new Set();
  let totalCaptured = 0;

  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const k = r * BOARD_SIZE + c;
      if (visited.has(k) || board[r][c] !== target) continue;
      const g = getGroup(r, c, visited);
      if (g && g.liberties === 0) {
        g.group.forEach(([gr, gc]) => { board[gr][gc] = EMPTY; });
        totalCaptured += g.group.length;
      }
    }
  }
  return totalCaptured;
}

// 检查指定方是否有无气的棋组（用于自杀检测，不修改棋盘）
function hasDeadGroups(player) {
  const visited = new Set();
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const k = r * BOARD_SIZE + c;
      if (visited.has(k) || board[r][c] !== player) continue;
      const g = getGroup(r, c, visited);
      if (g && g.liberties === 0) return true;
    }
  }
  return false;
}

// 完整提子流程：先提对方 → 再提己方（理论上不会发生，因有自杀禁手）
function checkCaptures(placedBy) {
  const opponent = placedBy === P1 ? P2 : P1;
  const captured = captureGroupsOf(opponent);
  captureGroupsOf(placedBy); // 安全检查
  return captured;
}

// ============================================================
// Tetris Line Clear
// ============================================================
function checkLineClears() {
  let cleared = 0;
  // Check rows
  for (let r = 0; r < BOARD_SIZE; r++) {
    let full = true;
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] === EMPTY) { full = false; break; }
    }
    if (full) {
      for (let c = 0; c < BOARD_SIZE; c++) board[r][c] = EMPTY;
      cleared++;
    }
  }
  // Check columns
  for (let c = 0; c < BOARD_SIZE; c++) {
    let full = true;
    for (let r = 0; r < BOARD_SIZE; r++) {
      if (board[r][c] === EMPTY) { full = false; break; }
    }
    if (full) {
      for (let r = 0; r < BOARD_SIZE; r++) board[r][c] = EMPTY;
      cleared++;
    }
  }
  return cleared;
}

// ============================================================
// Scoring - 仅数棋面方块
// ============================================================
function countPieces(player) {
  let n = 0;
  for (let r = 0; r < BOARD_SIZE; r++)
    for (let c = 0; c < BOARD_SIZE; c++)
      if (board[r][c] === player) n++;
  return n;
}

// ============================================================
// Place & Turn
// ============================================================
function placePiece(cells, row, col, player) {
  // Snapshot for detecting changes
  const before = board.map(r => [...r]);
  const placedCells = [];
  for (const [dr, dc] of cells) {
    const r = row + dr, c = col + dc;
    board[r][c] = player;
    placedCells.push([r, c]);
  }
  const captured = checkCaptures(player);
  // Snapshot after capture but before line clear to distinguish the two
  const afterCapture = board.map(r => [...r]);
  const linesCleared = checkLineClears();
  if (linesCleared > 0) checkCaptures(player);

  // Detect captured cells (were P1/P2 before, became EMPTY after capture)
  const capturedCells = [];
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const was = before[r][c], afterCap = afterCapture[r][c];
      if ((was === P1 || was === P2) && afterCap === EMPTY && !placedCells.some(([pr, pc]) => pr === r && pc === c)) {
        capturedCells.push([r, c]);
      }
    }
  }
  // Detect cleared cells (were non-empty after capture, now EMPTY after line clear)
  const clearedCells = [];
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const afterCap = afterCapture[r][c], now = board[r][c];
      if (afterCap !== EMPTY && now === EMPTY) {
        clearedCells.push([r, c, afterCap]);
      }
    }
  }

  // Queue animations
  const t = performance.now();
  const color = player === P1 ? P1_COLOR : P2_COLOR;
  if (placedCells.length > 0) {
    animations.push({ type: 'place', cells: placedCells, color, startTime: t, duration: 250 });
  }
  if (capturedCells.length > 0) {
    animations.push({ type: 'capture', cells: capturedCells, startTime: t + 100, duration: 400 });
  }
  if (clearedCells.length > 0) {
    animations.push({ type: 'clear', cells: clearedCells, startTime: t + 150, duration: 350 });
  }
  startAnimLoop();

  return { captured, linesCleared };
}

function nextTurn() {
  currentPlayer = currentPlayer === P1 ? P2 : P1;
  rotation = 0;
  ghostPos = null;

  if (!canPlaceAnywhere(currentPlayer, pieces[currentPlayer].cells)) {
    // reroll_once_then_pass: 重抽一次，仍不行则跳过
    generatePiece(currentPlayer);
    if (!canPlaceAnywhere(currentPlayer, pieces[currentPlayer].cells)) {
      skipCount++;
      moveHistory.push({
        turn: moveHistory.length + 1,
        player: currentPlayer,
        type: 'auto_skip'
      });
      if (skipCount >= 2) { endGame(); return; }
      setStatus(playerName(currentPlayer) + ' 无法落子，跳过');
      playSkipSfx();
      generatePiece(currentPlayer);
      nextTurn();
      return;
    }
  }

  updatePanels();
  setStatus(playerName(currentPlayer) + ' 的回合');
  updateLegalMovesCache();
  render();

  if (gameMode === 'pvai' && currentPlayer === P2 && gameActive) {
    setTimeout(aiMove, 400);
  }
}

function skipTurn() {
  if (!gameActive || replayMode) return;
  if (gameMode === 'pvai' && currentPlayer === P2) return;
  skipCount++;
  moveHistory.push({
    turn: moveHistory.length + 1,
    player: currentPlayer,
    type: 'skip'
  });
  generatePiece(currentPlayer);
  playSkipSfx();
  if (skipCount >= 2) { endGame(); return; }
  setStatus(playerName(currentPlayer) + ' 跳过了回合');
  nextTurn();
}

function endGame() {
  gameActive = false;
  stopBgm();
  playSfx('gameOver');
  const s1 = countPieces(P1), s2 = countPieces(P2);

  let result;
  if (s1 > s2) result = playerName(P1) + ' 获胜!';
  else if (s2 > s1) result = playerName(P2) + ' 获胜!';
  else result = '平局!';

  document.getElementById('gameOverTitle').textContent = '游戏结束';
  document.getElementById('gameOverResult').textContent = result;
  document.getElementById('gameOverDetail').textContent =
    `${playerName(P1)}: ${s1} 方块\n${playerName(P2)}: ${s2} 方块`;
  document.getElementById('gameOverOverlay').classList.add('show');
  updatePanels();
  render();
}

function closeOverlay() {
  document.getElementById('gameOverOverlay').classList.remove('show');
}

// ============================================================
// AI
// ============================================================
function aiMove() {
  if (!gameActive || currentPlayer !== P2) return;
  const aiLevel = parseInt(document.getElementById('aiLevelSelect').value);
  if (aiLevel === 4) { neuralNetworkMove(); return; }
  if (aiLevel === 5) { mctsMove(); return; }
  const piece = pieces[P2];
  let bestScore = -Infinity;
  let bestMoves = [];

  for (let rot = 0; rot < 4; rot++) {
    const cells = getRotatedCells(piece.cells, rot);
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (!isLegalMove(cells, r, c, P2)) continue;
        const boardCopy = board.map(row => [...row]);
        for (const [dr, dc] of cells) board[r + dr][c + dc] = P2;
        const captured = checkCaptures(P2);
        const linesCleared = checkLineClears();
        if (linesCleared > 0) checkCaptures(P2);

        const score = evaluateAI(r, c, cells, captured, linesCleared, aiLevel);

        // Restore board
        for (let rr = 0; rr < BOARD_SIZE; rr++)
          for (let cc = 0; cc < BOARD_SIZE; cc++)
            board[rr][cc] = boardCopy[rr][cc];

        if (score > bestScore) {
          bestScore = score;
          bestMoves = [{ rot, row: r, col: c, cells }];
        } else if (score === bestScore) {
          bestMoves.push({ rot, row: r, col: c, cells });
        }
      }
    }
  }

  if (bestMoves.length === 0) {
    skipCount++;
    generatePiece(P2);
    if (skipCount >= 2) { endGame(); return; }
    nextTurn();
    return;
  }

  const move = bestMoves[Math.floor(Math.random() * bestMoves.length)];
  rotation = move.rot;
  const aiPieceName = pieces[P2].name;
  const aiPlacedCells = move.cells.map(([dr, dc]) => [move.row + dr, move.col + dc]);
  const result = placePiece(move.cells, move.row, move.col, P2);
  skipCount = 0;
  lastPlacedMove = { player: P2, cells: aiPlacedCells };
  moveHistory.push({
    turn: moveHistory.length + 1,
    player: P2,
    piece: aiPieceName,
    rotation: move.rot,
    row: move.row,
    col: move.col,
    captured: result.captured,
    linesCleared: result.linesCleared,
    type: 'place'
  });

  let msg = 'AI 落子';
  if (result.captured > 0) msg += ` | 围杀 ${result.captured} 子`;
  if (result.linesCleared > 0) msg += ` | 消除 ${result.linesCleared} 行/列`;
  setStatus(msg);

  playSfx('place');
  let aiDelay = 350;
  if (result.captured > 0) {
    setTimeout(() => playSfx('capture'), 100);
    aiDelay = 600;
  }
  if (result.linesCleared > 0) {
    setTimeout(() => playSfx('clear'), result.captured > 0 ? 550 : 150);
    aiDelay = Math.max(aiDelay, result.captured > 0 ? 1000 : 600);
  }

  generatePiece(P2);
  updatePanels();
  render();
  setTimeout(() => nextTurn(), aiDelay);
}

function evaluateAI(row, col, cells, captured, linesCleared, level) {
  let score = captured * 15 + linesCleared * 3;

  const center = BOARD_SIZE / 2;
  let avgR = 0, avgC = 0;
  cells.forEach(([dr, dc]) => { avgR += row + dr; avgC += col + dc; });
  avgR /= cells.length; avgC /= cells.length;
  score -= (Math.abs(avgR - center) + Math.abs(avgC - center)) * 0.3;

  let ownAdj = 0, enemyAdj = 0;
  for (const [dr, dc] of cells) {
    const r = row + dr, c = col + dc;
    for (const [nr, nc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const ar = r + nr, ac = c + nc;
      if (ar < 0 || ar >= BOARD_SIZE || ac < 0 || ac >= BOARD_SIZE) continue;
      if (board[ar][ac] === P2) ownAdj++;
      if (board[ar][ac] === P1) enemyAdj++;
    }
  }
  score += ownAdj * 1.5;

  if (level >= 2) {
    score += enemyAdj * 2;
    score += countPieces(P2) * 0.1;
  }

  if (level >= 3) {
    const visited = new Set();
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        const k = r * BOARD_SIZE + c;
        if (visited.has(k) || board[r][c] !== P1) continue;
        const g = getGroup(r, c, visited);
        if (g && g.liberties <= 2) score += (3 - g.liberties) * 5;
      }
    }
    score += captured * 5;
  }

  score += Math.random() * 0.5;
  return score;
}

// ============================================================
// Neural Network AI (ONNX)
// ============================================================
async function loadOnnxModel() {
  if (onnxSession) return onnxSession;
  if (onnxLoading) {
    // Wait for in-progress load to finish
    while (onnxLoading) await new Promise(r => setTimeout(r, 100));
    return onnxSession;
  }
  onnxLoading = true;
  setStatus('加载神经网络模型... 0%');
  try {
    const resp = await fetch(ONNX_MODEL_PATH);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const total = parseInt(resp.headers.get('content-length') || '0');
    const reader = resp.body.getReader();
    const chunks = [];
    let loaded = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      loaded += value.length;
      if (total > 0) {
        const pct = Math.min(99, Math.round(loaded / total * 100));
        setStatus(`加载神经网络模型... ${pct}%`);
      }
    }
    const buf = new Uint8Array(loaded);
    let offset = 0;
    for (const chunk of chunks) { buf.set(chunk, offset); offset += chunk.length; }
    setStatus('加载神经网络模型... 初始化中');
    onnxSession = await ort.InferenceSession.create(buf.buffer);
    setStatus('神经网络模型已加载');
    console.log('ONNX model loaded');
  } catch (e) {
    console.error('ONNX load failed:', e);
    setStatus('模型加载失败，回退到启发式AI');
    onnxLoading = false;
    return null;
  }
  onnxLoading = false;
  return onnxSession;
}

function encodeState(player) {
  const S = BOARD_SIZE;
  const data = new Float32Array(INPUT_CHANNELS * S * S);
  const opponent = player === P1 ? P2 : P1;

  // Channels 0-4: board one-hot (from current player's perspective)
  for (let r = 0; r < S; r++) {
    for (let c = 0; c < S; c++) {
      const cell = board[r][c];
      const offset = r * S + c;
      if (cell === EMPTY)    data[0 * S * S + offset] = 1;
      else if (cell === player)   data[1 * S * S + offset] = 1;
      else if (cell === opponent) data[2 * S * S + offset] = 1;
      // Channels 3-4 (DEAD1/DEAD2) always zero under Go-style capture rules
    }
  }

  // Channels 5-11: current piece one-hot
  const piece = pieces[player];
  if (piece) {
    const pidx = PIECE_NAMES.indexOf(piece.name);
    const ch = 5 + pidx;
    for (let i = 0; i < S * S; i++) data[ch * S * S + i] = 1;
  }

  // Channels 12-18: bag remaining counts (normalized by 7)
  const bagCounts = bagPieceCounts();
  for (let i = 0; i < PIECE_NAMES.length; i++) {
    const val = bagCounts[PIECE_NAMES[i]] / 7.0;
    const ch = 12 + i;
    for (let j = 0; j < S * S; j++) data[ch * S * S + j] = val;
  }

  // Channel 19: bag7 mode indicator (always 1 in web version)
  for (let i = 0; i < S * S; i++) data[19 * S * S + i] = 1;

  // Channel 20-21: player indicator
  const isP1 = player === P1 ? 1 : 0;
  for (let i = 0; i < S * S; i++) {
    data[20 * S * S + i] = isP1;
    data[21 * S * S + i] = 1 - isP1;
  }

  return data;
}

async function neuralNetworkMove() {
  const session = await loadOnnxModel();
  if (!session) { aiMove(); return; } // fallback

  const S = BOARD_SIZE;
  const stateData = encodeState(P2);
  const inputTensor = new ort.Tensor('float32', stateData, [1, INPUT_CHANNELS, S, S]);

  const results = await session.run({ state: inputTensor });
  const policyLogits = results.policy.data; // Float32Array(400)

  // Collect legal moves and their policy scores
  const piece = pieces[P2];
  let candidates = [];
  for (let rot = 0; rot < 4; rot++) {
    const cells = getRotatedCells(piece.cells, rot);
    for (let r = 0; r < S; r++) {
      for (let c = 0; c < S; c++) {
        if (!isLegalMove(cells, r, c, P2)) continue;
        const actionIdx = rot * S * S + r * S + c;
        candidates.push({ rot, row: r, col: c, cells, score: policyLogits[actionIdx] });
      }
    }
  }

  if (candidates.length === 0) {
    skipCount++;
    generatePiece(P2);
    if (skipCount >= 2) { endGame(); return; }
    nextTurn();
    return;
  }

  // Softmax over legal moves and sample (temperature=0.5 for slight variety)
  const temperature = 0.5;
  const maxScore = Math.max(...candidates.map(c => c.score));
  let expSum = 0;
  for (const c of candidates) {
    c.prob = Math.exp((c.score - maxScore) / temperature);
    expSum += c.prob;
  }
  for (const c of candidates) c.prob /= expSum;

  // Weighted random selection
  let rand = Math.random();
  let move = candidates[candidates.length - 1];
  for (const c of candidates) {
    rand -= c.prob;
    if (rand <= 0) { move = c; break; }
  }

  rotation = move.rot;
  const nnPieceName = pieces[P2].name;
  const nnPlacedCells = move.cells.map(([dr, dc]) => [move.row + dr, move.col + dc]);
  const result = placePiece(move.cells, move.row, move.col, P2);
  skipCount = 0;
  lastPlacedMove = { player: P2, cells: nnPlacedCells };
  moveHistory.push({
    turn: moveHistory.length + 1,
    player: P2,
    piece: nnPieceName,
    rotation: move.rot,
    row: move.row,
    col: move.col,
    captured: result.captured,
    linesCleared: result.linesCleared,
    type: 'place'
  });

  let msg = 'AI(神经网络) 落子';
  if (result.captured > 0) msg += ` | 围杀 ${result.captured} 子`;
  if (result.linesCleared > 0) msg += ` | 消除 ${result.linesCleared} 行/列`;
  setStatus(msg);

  playSfx('place');
  let nnDelay = 350;
  if (result.captured > 0) {
    setTimeout(() => playSfx('capture'), 100);
    nnDelay = 600;
  }
  if (result.linesCleared > 0) {
    setTimeout(() => playSfx('clear'), result.captured > 0 ? 550 : 150);
    nnDelay = Math.max(nnDelay, result.captured > 0 ? 1000 : 600);
  }

  generatePiece(P2);
  updatePanels();
  render();
  setTimeout(() => nextTurn(), nnDelay);
}

// ============================================================
// MCTS (Monte Carlo Tree Search) with Neural Network
// ============================================================
let MCTS_SIMS = 40;
const MCTS_CPUCT = 1.5;

// Lightweight game state for MCTS simulation
class SimGame {
  constructor(size) {
    this.size = size;
    this.board = null;
    this.currentPlayer = P1;
    this.pieces = { [P1]: null, [P2]: null };
    this.bag = [];
    this.skipCount = 0;
    this.gameOver = false;
  }

  // Clone from current global game state
  static fromGlobal() {
    const g = new SimGame(BOARD_SIZE);
    g.board = board.map(r => [...r]);
    g.currentPlayer = currentPlayer;
    g.pieces = {
      [P1]: pieces[P1] ? { name: pieces[P1].name, cells: pieces[P1].cells.map(c => [...c]) } : null,
      [P2]: pieces[P2] ? { name: pieces[P2].name, cells: pieces[P2].cells.map(c => [...c]) } : null,
    };
    g.bag = [...bag];
    g.skipCount = skipCount;
    g.gameOver = false;
    return g;
  }

  clone() {
    const g = new SimGame(this.size);
    g.board = this.board.map(r => [...r]);
    g.currentPlayer = this.currentPlayer;
    g.pieces = {
      [P1]: this.pieces[P1] ? { name: this.pieces[P1].name, cells: this.pieces[P1].cells.map(c => [...c]) } : null,
      [P2]: this.pieces[P2] ? { name: this.pieces[P2].name, cells: this.pieces[P2].cells.map(c => [...c]) } : null,
    };
    g.bag = [...this.bag];
    g.skipCount = this.skipCount;
    g.gameOver = this.gameOver;
    return g;
  }

  _refillBag() {
    this.bag = [...PIECE_NAMES];
    for (let i = this.bag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [this.bag[i], this.bag[j]] = [this.bag[j], this.bag[i]];
    }
  }

  _generatePiece(player) {
    if (this.bag.length === 0) this._refillBag();
    const name = this.bag.pop();
    this.pieces[player] = { name, cells: PIECE_SHAPES[name].map(c => [...c]) };
  }

  canPlace(cells, row, col, player) {
    const S = this.size, b = this.board;
    for (const [dr, dc] of cells) {
      const r = row + dr, c = col + dc;
      if (r < 0 || r >= S || c < 0 || c >= S) return false;
      if (b[r][c] !== EMPTY) return false;
    }
    return true;
  }

  _getGroupHasLiberty(row, col) {
    const S = this.size, b = this.board;
    const owner = b[row][col];
    if (owner !== P1 && owner !== P2) return true;
    const visited = new Uint8Array(S * S);
    const stack = [[row, col]];
    visited[row * S + col] = 1;
    while (stack.length) {
      const [r, c] = stack.pop();
      for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= S || nc < 0 || nc >= S) continue;
        const k = nr * S + nc;
        if (visited[k]) continue;
        const cell = b[nr][nc];
        if (cell === EMPTY) return true;
        if (cell === owner) { visited[k] = 1; stack.push([nr, nc]); }
      }
    }
    return false;
  }

  _captureGroupsOf(target) {
    const S = this.size, b = this.board;
    const visited = new Uint8Array(S * S);
    let total = 0;
    for (let r = 0; r < S; r++) {
      for (let c = 0; c < S; c++) {
        const k = r * S + c;
        if (visited[k] || b[r][c] !== target) continue;
        const group = [];
        let hasLib = false;
        const stk = [[r, c]];
        visited[k] = 1;
        while (stk.length) {
          const [gr, gc] = stk.pop();
          group.push([gr, gc]);
          for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
            const nr = gr + dr, nc = gc + dc;
            if (nr < 0 || nr >= S || nc < 0 || nc >= S) continue;
            const nk = nr * S + nc;
            if (visited[nk]) continue;
            const cell = b[nr][nc];
            if (cell === EMPTY) { hasLib = true; }
            else if (cell === target) { visited[nk] = 1; stk.push([nr, nc]); }
          }
        }
        if (!hasLib) {
          for (const [gr, gc] of group) b[gr][gc] = EMPTY;
          total += group.length;
        }
      }
    }
    return total;
  }

  _checkLineClears() {
    const S = this.size, b = this.board;
    let cleared = 0;
    for (let r = 0; r < S; r++) {
      let full = true;
      for (let c = 0; c < S; c++) { if (b[r][c] === EMPTY) { full = false; break; } }
      if (full) { for (let c = 0; c < S; c++) b[r][c] = EMPTY; cleared++; }
    }
    for (let c = 0; c < S; c++) {
      let full = true;
      for (let r = 0; r < S; r++) { if (b[r][c] === EMPTY) { full = false; break; } }
      if (full) { for (let r = 0; r < S; r++) b[r][c] = EMPTY; cleared++; }
    }
    return cleared;
  }

  isLegalMove(cells, row, col, player) {
    if (!this.canPlace(cells, row, col, player)) return false;
    const S = this.size, b = this.board;
    const snapshot = b.map(r => [...r]);
    for (const [dr, dc] of cells) b[row + dr][col + dc] = player;
    const opp = player === P1 ? P2 : P1;
    this._captureGroupsOf(opp);
    // Check self-suicide from placed cells
    let selfDead = false;
    for (const [dr, dc] of cells) {
      if (!this._getGroupHasLiberty(row + dr, col + dc)) { selfDead = true; break; }
    }
    for (let r = 0; r < S; r++) for (let c = 0; c < S; c++) b[r][c] = snapshot[r][c];
    return !selfDead;
  }

  getLegalMoves(player) {
    const piece = this.pieces[player];
    if (!piece) return [];
    const moves = [];
    const seen = new Set();
    for (let rot = 0; rot < 4; rot++) {
      const cells = getRotatedCells(piece.cells, rot);
      const key = cells.map(([r,c]) => `${r},${c}`).sort().join(';');
      if (seen.has(key)) continue;
      seen.add(key);
      const bounds = getPieceBounds(cells);
      const maxR = this.size - bounds.rows + 1;
      const maxC = this.size - bounds.cols + 1;
      for (let r = 0; r < maxR; r++) {
        for (let c = 0; c < maxC; c++) {
          if (this.isLegalMove(cells, r, c, player)) {
            moves.push({ rot, row: r, col: c, cells });
          }
        }
      }
    }
    return moves;
  }

  // Execute a move (mutates this game state)
  doMove(rot, row, col) {
    const player = this.currentPlayer;
    const piece = this.pieces[player];
    const cells = getRotatedCells(piece.cells, rot);
    const b = this.board;
    for (const [dr, dc] of cells) b[row + dr][col + dc] = player;
    const opp = player === P1 ? P2 : P1;
    const captured = this._captureGroupsOf(opp);
    this._captureGroupsOf(player);
    const linesCleared = this._checkLineClears();
    if (linesCleared > 0) this._captureGroupsOf(opp);
    this.skipCount = 0;
    this._generatePiece(player);
    this._advanceTurn();
  }

  doSkip() {
    this.skipCount++;
    this._generatePiece(this.currentPlayer);
    if (this.skipCount >= 2) { this.gameOver = true; return; }
    this._advanceTurn();
  }

  _advanceTurn() {
    this.currentPlayer = this.currentPlayer === P1 ? P2 : P1;
    const piece = this.pieces[this.currentPlayer];
    if (!piece) { this.gameOver = true; return; }
    // reroll_once_then_pass
    const moves = this.getLegalMoves(this.currentPlayer);
    if (moves.length === 0) {
      this._generatePiece(this.currentPlayer);
      const moves2 = this.getLegalMoves(this.currentPlayer);
      if (moves2.length === 0) {
        this.skipCount++;
        if (this.skipCount >= 2) { this.gameOver = true; return; }
        this._generatePiece(this.currentPlayer);
        this._advanceTurn();
      }
    }
  }

  // Encode state for ONNX (same as global encodeState but using this.board)
  encodeState(player) {
    const S = this.size;
    const data = new Float32Array(INPUT_CHANNELS * S * S);
    const opponent = player === P1 ? P2 : P1;
    for (let r = 0; r < S; r++) {
      for (let c = 0; c < S; c++) {
        const cell = this.board[r][c];
        const offset = r * S + c;
        if (cell === EMPTY)         data[0 * S * S + offset] = 1;
        else if (cell === player)   data[1 * S * S + offset] = 1;
        else if (cell === opponent) data[2 * S * S + offset] = 1;
        // Channels 3-4 (DEAD1/DEAD2) always zero under Go-style capture rules
      }
    }
    const piece = this.pieces[player];
    if (piece) {
      const pidx = PIECE_NAMES.indexOf(piece.name);
      for (let i = 0; i < S * S; i++) data[(5 + pidx) * S * S + i] = 1;
    }
    const bagCounts = {};
    for (const n of PIECE_NAMES) bagCounts[n] = 0;
    for (const n of this.bag) bagCounts[n]++;
    for (let i = 0; i < PIECE_NAMES.length; i++) {
      const val = bagCounts[PIECE_NAMES[i]] / 7.0;
      for (let j = 0; j < S * S; j++) data[(12 + i) * S * S + j] = val;
    }
    for (let i = 0; i < S * S; i++) data[19 * S * S + i] = 1;
    const isP1 = player === P1 ? 1 : 0;
    for (let i = 0; i < S * S; i++) {
      data[20 * S * S + i] = isP1;
      data[21 * S * S + i] = 1 - isP1;
    }
    return data;
  }

  // Simple score: count pieces
  getScore(player) {
    let n = 0;
    for (let r = 0; r < this.size; r++)
      for (let c = 0; c < this.size; c++)
        if (this.board[r][c] === player) n++;
    return n;
  }
}

// MCTS Node
class MCTSNode {
  constructor(game, parent, move) {
    this.game = game;       // SimGame state at this node
    this.parent = parent;
    this.move = move;        // { rot, row, col } that led here
    this.children = [];
    this.visits = 0;
    this.totalValue = 0;
    this.prior = 0;          // policy prior from neural network
    this.expanded = false;
  }

  q() { return this.visits > 0 ? this.totalValue / this.visits : 0; }

  ucb(parentVisits) {
    return this.q() + MCTS_CPUCT * this.prior * Math.sqrt(parentVisits) / (1 + this.visits);
  }

  bestChild() {
    let best = null, bestScore = -Infinity;
    for (const child of this.children) {
      const score = child.ucb(this.visits);
      if (score > bestScore) { bestScore = score; best = child; }
    }
    return best;
  }
}

async function mctsSearch(session, rootGame, player) {
  const S = rootGame.size;
  const root = new MCTSNode(rootGame, null, null);

  // Expand root
  await expandNode(session, root, player);
  if (root.children.length === 0) return null;

  for (let sim = 0; sim < MCTS_SIMS; sim++) {
    // 1. Select: walk tree using UCB
    let node = root;
    while (node.expanded && node.children.length > 0) {
      node = node.bestChild();
    }

    // 2. Expand & Evaluate
    let value;
    if (node.game.gameOver) {
      const s1 = node.game.getScore(player);
      const s2 = node.game.getScore(player === P1 ? P2 : P1);
      value = s1 > s2 ? 1 : (s1 < s2 ? -1 : 0);
    } else {
      value = await expandNode(session, node, player);
    }

    // 3. Backpropagate
    let cur = node;
    while (cur) {
      cur.visits++;
      cur.totalValue += value;
      cur = cur.parent;
    }

    // Yield every 8 simulations to keep UI alive
    if (sim % 8 === 7) {
      setStatus(`AI 思考中... (${sim + 1}/${MCTS_SIMS})`);
      await new Promise(r => setTimeout(r, 0));
    }
  }

  // Pick most-visited child
  let bestChild = null, bestVisits = -1;
  for (const child of root.children) {
    if (child.visits > bestVisits) { bestVisits = child.visits; bestChild = child; }
  }
  return bestChild ? bestChild.move : null;
}

async function expandNode(session, node, mctsPlayer) {
  const game = node.game;
  const player = game.currentPlayer;
  const legalMoves = game.getLegalMoves(player);

  if (legalMoves.length === 0) {
    node.expanded = true;
    return 0;
  }

  // Neural network evaluation
  const stateData = game.encodeState(player);
  const inputTensor = new ort.Tensor('float32', stateData, [1, INPUT_CHANNELS, game.size, game.size]);
  const results = await session.run({ state: inputTensor });
  const policyLogits = results.policy.data;
  const value = results.value.data[0]; // from current player's perspective

  // Extract policy priors for legal moves
  const S = game.size;
  let maxLogit = -Infinity;
  for (const m of legalMoves) {
    const idx = m.rot * S * S + m.row * S + m.col;
    m.logit = policyLogits[idx];
    if (m.logit > maxLogit) maxLogit = m.logit;
  }
  let expSum = 0;
  for (const m of legalMoves) {
    m.prob = Math.exp(m.logit - maxLogit);
    expSum += m.prob;
  }

  // Create children
  for (const m of legalMoves) {
    const childGame = game.clone();
    childGame.doMove(m.rot, m.row, m.col);
    const child = new MCTSNode(childGame, node, { rot: m.rot, row: m.row, col: m.col, cells: m.cells });
    child.prior = m.prob / expSum;
    node.children.push(child);
  }
  node.expanded = true;

  // Return value from mctsPlayer's perspective
  return player === mctsPlayer ? value : -value;
}

async function mctsMove() {
  if (!gameActive || currentPlayer !== P2) return;

  const session = await loadOnnxModel();
  if (!session) { aiMove(); return; }

  setStatus('AI 思考中... (0/' + MCTS_SIMS + ')');
  await new Promise(r => setTimeout(r, 0));

  const rootGame = SimGame.fromGlobal();
  const bestMove = await mctsSearch(session, rootGame, P2);

  if (!bestMove) {
    skipCount++;
    moveHistory.push({ turn: moveHistory.length + 1, player: P2, type: 'auto_skip' });
    generatePiece(P2);
    if (skipCount >= 2) { endGame(); return; }
    nextTurn();
    return;
  }

  rotation = bestMove.rot;
  const mctsPieceName = pieces[P2].name;
  const mctsPlacedCells = bestMove.cells.map(([dr, dc]) => [bestMove.row + dr, bestMove.col + dc]);
  const result = placePiece(bestMove.cells, bestMove.row, bestMove.col, P2);
  skipCount = 0;
  lastPlacedMove = { player: P2, cells: mctsPlacedCells };
  moveHistory.push({
    turn: moveHistory.length + 1,
    player: P2,
    piece: mctsPieceName,
    rotation: bestMove.rot,
    row: bestMove.row,
    col: bestMove.col,
    captured: result.captured,
    linesCleared: result.linesCleared,
    type: 'place'
  });

  let msg = 'AI(MCTS) 落子';
  if (result.captured > 0) msg += ` | 围杀 ${result.captured} 子`;
  if (result.linesCleared > 0) msg += ` | 消除 ${result.linesCleared} 行/列`;
  setStatus(msg);

  playSfx('place');
  let mctsDelay = 350;
  if (result.captured > 0) {
    setTimeout(() => playSfx('capture'), 100);
    mctsDelay = 600;
  }
  if (result.linesCleared > 0) {
    setTimeout(() => playSfx('clear'), result.captured > 0 ? 550 : 150);
    mctsDelay = Math.max(mctsDelay, result.captured > 0 ? 1000 : 600);
  }

  generatePiece(P2);
  updatePanels();
  render();
  setTimeout(() => nextTurn(), mctsDelay);
}

// ============================================================
// Input
// ============================================================
function onMouseMove(e) {
  if (!gameActive || (gameMode === 'pvai' && currentPlayer === P2)) return;
  const rect = boardCanvas.getBoundingClientRect();
  const col = Math.floor((e.clientX - rect.left) / CELL_SIZE);
  const row = Math.floor((e.clientY - rect.top) / CELL_SIZE);
  const cells = getCurrentCells();
  const bounds = getPieceBounds(cells);
  ghostPos = { row: row - Math.floor(bounds.rows / 2), col: col - Math.floor(bounds.cols / 2) };
  render();
}

function onBoardClick(e) {
  if (!gameActive || (gameMode === 'pvai' && currentPlayer === P2) || !ghostPos) return;
  const cells = getCurrentCells();
  if (!isLegalMove(cells, ghostPos.row, ghostPos.col, currentPlayer)) {
    playIllegalSfx();
    return;
  }
  doPlace();
}

function onKeyDown(e) {
  // Replay mode: arrow keys step through moves
  if (replayMode) {
    if (e.key === 'ArrowLeft') replayStep(-1);
    else if (e.key === 'ArrowRight') replayStep(1);
    else if (e.key === 'Home') replayStep(-Infinity);
    else if (e.key === 'End') replayStep(Infinity);
    else if (e.key === ' ') { e.preventDefault(); toggleReplayAuto(); }
    else if (e.key === 'Escape') exitReplay();
    return;
  }
  if (!gameActive) return;
  if (e.key === 'r' || e.key === 'R') rotatePiece();
  else if (e.key === 'ArrowLeft' && ghostPos) { ghostPos.col--; render(); }
  else if (e.key === 'ArrowRight' && ghostPos) { ghostPos.col++; render(); }
  else if (e.key === 'ArrowUp' && ghostPos) { ghostPos.row--; render(); }
  else if (e.key === 'ArrowDown' && ghostPos) { ghostPos.row++; render(); }
}

function rotatePiece() {
  if (!gameActive || replayMode) return;
  rotation = (rotation + 1) % 4;
  playSfx('rotate');
  updateLegalMovesCache();
  render();
  renderPreview(currentPlayer);
}

// ============================================================
// Touch Input
// ============================================================
let touchStartPos = null;
let touchMoved = false;

function getTouchBoardPos(touch) {
  const rect = boardCanvas.getBoundingClientRect();
  const col = Math.floor((touch.clientX - rect.left) / CELL_SIZE);
  const row = Math.floor((touch.clientY - rect.top) / CELL_SIZE);
  const cells = getCurrentCells();
  const bounds = getPieceBounds(cells);
  return { row: row - Math.floor(bounds.rows / 2), col: col - Math.floor(bounds.cols / 2) };
}

function onTouchStart(e) {
  e.preventDefault();
  if (!gameActive || (gameMode === 'pvai' && currentPlayer === P2)) return;
  touchMoved = false;

  const pos = getTouchBoardPos(e.touches[0]);
  ghostPos = pos;
  touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  render();
}

function onTouchMove(e) {
  e.preventDefault();
  if (!gameActive || (gameMode === 'pvai' && currentPlayer === P2)) return;
  if (e.touches.length !== 1) return;
  touchMoved = true;
  ghostPos = getTouchBoardPos(e.touches[0]);
  render();
}

function onTouchEnd(e) {
  e.preventDefault();
  if (!gameActive || (gameMode === 'pvai' && currentPlayer === P2)) return;
  // If didn't move much, treat as tap-to-place
  if (!touchMoved && ghostPos) {
    const cells = getCurrentCells();
    if (isLegalMove(cells, ghostPos.row, ghostPos.col, currentPlayer)) {
      doPlace();
      return;
    }
  }

  // If dragged, place at release position
  if (touchMoved && ghostPos) {
    const cells = getCurrentCells();
    if (isLegalMove(cells, ghostPos.row, ghostPos.col, currentPlayer)) {
      doPlace();
      return;
    }
  }

  // Keep ghost visible for mobile d-pad adjustments
  render();
}

// Mobile d-pad controls
function movePieceDir(dr, dc) {
  if (!gameActive || (gameMode === 'pvai' && currentPlayer === P2)) return;
  if (!ghostPos) {
    // Default to board center
    const cells = getCurrentCells();
    const bounds = getPieceBounds(cells);
    ghostPos = {
      row: Math.floor((BOARD_SIZE - bounds.rows) / 2),
      col: Math.floor((BOARD_SIZE - bounds.cols) / 2)
    };
  }
  ghostPos.row += dr;
  ghostPos.col += dc;
  render();
}

function confirmPlace() {
  if (!gameActive || (gameMode === 'pvai' && currentPlayer === P2)) return;
  if (!ghostPos) {
    movePieceDir(0, 0);
    return;
  }
  const cells = getCurrentCells();
  if (isLegalMove(cells, ghostPos.row, ghostPos.col, currentPlayer)) {
    doPlace();
  } else {
    playIllegalSfx();
  }
}

function doPlace() {
  const cells = getCurrentCells();
  const pieceName = pieces[currentPlayer].name;
  const placedCellPositions = cells.map(([dr, dc]) => [ghostPos.row + dr, ghostPos.col + dc]);
  const result = placePiece(cells, ghostPos.row, ghostPos.col, currentPlayer);
  skipCount = 0;
  lastPlacedMove = { player: currentPlayer, cells: placedCellPositions };
  moveHistory.push({
    turn: moveHistory.length + 1,
    player: currentPlayer,
    piece: pieceName,
    rotation: rotation,
    row: ghostPos.row,
    col: ghostPos.col,
    captured: result.captured,
    linesCleared: result.linesCleared,
    type: 'place'
  });

  let msg = playerName(currentPlayer) + ' 落子';
  if (result.captured > 0) msg += ` | 围杀 ${result.captured} 子`;
  if (result.linesCleared > 0) msg += ` | 消除 ${result.linesCleared} 行/列`;
  setStatus(msg);

  // Play sound with timing aligned to animation
  // place anim: 250ms, capture anim: starts at +100, 400ms, clear anim: starts at +150, 350ms
  playSfx('place');
  let delay = 300; // base delay after place animation (250ms)
  if (result.captured > 0) {
    setTimeout(() => playSfx('capture'), 100);
    delay = 550; // wait for capture animation (100 + 400ms)
  }
  if (result.linesCleared > 0) {
    setTimeout(() => playSfx('clear'), result.captured > 0 ? 550 : 150);
    delay = Math.max(delay, result.captured > 0 ? 950 : 550); // wait for clear animation
  }

  generatePiece(currentPlayer);
  ghostPos = null;
  updatePanels();
  render();
  autoSave();
  setTimeout(() => nextTurn(), delay);
}

// ============================================================
// Rendering
// ============================================================
function render() {
  const ctx = boardCtx;
  const size = BOARD_SIZE * CELL_SIZE;
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, size, size);

  // Grid
  ctx.strokeStyle = GRID_COLOR;
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= BOARD_SIZE; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(size, i * CELL_SIZE); ctx.stroke();
  }

  // Cells
  for (let r = 0; r < board.length; r++)
    for (let c = 0; c < (board[r] ? board[r].length : 0); c++)
      if (board[r][c] !== EMPTY) drawCell(ctx, r, c, board[r][c]);

  // Last opponent move highlight
  if (lastPlacedMove && !replayMode) {
    ctx.save();
    const oppColor = lastPlacedMove.player === P1 ? P1_COLOR : P2_COLOR;
    ctx.strokeStyle = oppColor;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = oppColor;
    ctx.shadowBlur = 6;
    for (const [r, c] of lastPlacedMove.cells) {
      if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === lastPlacedMove.player) {
        ctx.strokeRect(c * CELL_SIZE + 1.5, r * CELL_SIZE + 1.5, CELL_SIZE - 3, CELL_SIZE - 3);
      }
    }
    ctx.restore();
  }

  // Single legal move indicator — golden pulsing outline when only one spot for current rotation
  if (cachedLegalMoves && cachedLegalMoves.moves.length === 1 && gameActive && !replayMode
      && !(gameMode === 'pvai' && currentPlayer === P2)) {
    const m = cachedLegalMoves.moves[0];
    const cells = cachedLegalMoves.cells;
    ctx.save();
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 300);
    ctx.strokeStyle = `rgba(255,215,0,${0.5 + pulse * 0.5})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    for (const [dr, dc] of cells) {
      const r = m.row + dr, c = m.col + dc;
      if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) {
        ctx.strokeRect(c * CELL_SIZE + 1, r * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
      }
    }
    ctx.restore();
    // Keep animating the pulse
    if (!animFrameId) animFrameId = requestAnimationFrame(animTick);
  }

  // Ghost
  if (ghostPos && gameActive && pieces[currentPlayer]) {
    const cells = getCurrentCells();
    const valid = isLegalMove(cells, ghostPos.row, ghostPos.col, currentPlayer);
    ctx.globalAlpha = GHOST_ALPHA;
    for (const [dr, dc] of cells) {
      const r = ghostPos.row + dr, c = ghostPos.col + dc;
      if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) continue;
      ctx.fillStyle = valid ? (currentPlayer === P1 ? P1_COLOR : P2_COLOR) : '#ff1744';
      ctx.fillRect(c * CELL_SIZE + 1, r * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
    }
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// Animation System
// ============================================================
function startAnimLoop() {
  if (animFrameId) return;
  animFrameId = requestAnimationFrame(animTick);
}

function animTick(now) {
  // Remove finished animations
  animations = animations.filter(a => now < a.startTime + a.duration);
  if (animations.length === 0) {
    animFrameId = null;
    render(); // Final clean render
    return;
  }

  render();
  const ctx = boardCtx;

  for (const anim of animations) {
    const elapsed = now - anim.startTime;
    if (elapsed < 0) continue; // Not started yet
    const t = Math.min(1, elapsed / anim.duration);

    if (anim.type === 'place') {
      // Scale-up with glow
      const scale = 0.5 + 0.5 * easeOutBack(t);
      const glowAlpha = (1 - t) * 0.6;
      for (const [r, c] of anim.cells) {
        const cx = c * CELL_SIZE + CELL_SIZE / 2;
        const cy = r * CELL_SIZE + CELL_SIZE / 2;
        const sz = (CELL_SIZE - 2) * scale;
        // Glow
        if (glowAlpha > 0.01) {
          ctx.shadowColor = anim.color;
          ctx.shadowBlur = 12 * (1 - t);
          ctx.globalAlpha = glowAlpha;
          ctx.fillStyle = anim.color;
          ctx.fillRect(cx - sz / 2, cy - sz / 2, sz, sz);
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;
        }
      }
    } else if (anim.type === 'capture') {
      // Flash white then fade
      const flash = t < 0.3 ? Math.sin(t / 0.3 * Math.PI * 3) * 0.7 : 0;
      const fadeAlpha = t < 0.3 ? 0.8 : 0.8 * (1 - (t - 0.3) / 0.7);
      for (const [r, c] of anim.cells) {
        const x = c * CELL_SIZE, y = r * CELL_SIZE;
        // White flash overlay
        if (flash > 0) {
          ctx.globalAlpha = flash;
          ctx.fillStyle = '#fff';
          ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
        }
        // Red pulse outline
        if (fadeAlpha > 0.01) {
          ctx.globalAlpha = fadeAlpha;
          ctx.strokeStyle = '#ff1744';
          ctx.lineWidth = 2;
          ctx.strokeRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
        }
      }
      ctx.globalAlpha = 1;
    } else if (anim.type === 'clear') {
      // Sweep fade-out
      const alpha = (1 - easeInQuad(t)) * 0.6;
      if (alpha > 0.01) {
        for (const [r, c, was] of anim.cells) {
          const x = c * CELL_SIZE, y = r * CELL_SIZE;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = was === P1 ? P1_COLOR : (was === P2 ? P2_COLOR : '#888');
          const shrink = t * 6;
          ctx.fillRect(x + 1 + shrink, y + 1 + shrink,
                       CELL_SIZE - 2 - shrink * 2, CELL_SIZE - 2 - shrink * 2);
        }
        ctx.globalAlpha = 1;
      }
    }
  }

  animFrameId = requestAnimationFrame(animTick);
}

// Easing functions
function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function easeInQuad(t) {
  return t * t;
}

function drawCell(ctx, r, c, cell) {
  const x = c * CELL_SIZE, y = r * CELL_SIZE, pad = 1;
  if (cell === P1 || cell === P2) {
    ctx.fillStyle = cell === P1 ? P1_COLOR : P2_COLOR;
    ctx.fillRect(x + pad, y + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(x + pad, y + pad, CELL_SIZE - pad * 2, 3);
    ctx.fillRect(x + pad, y + pad, 3, CELL_SIZE - pad * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x + CELL_SIZE - pad - 3, y + pad, 3, CELL_SIZE - pad * 2);
    ctx.fillRect(x + pad, y + CELL_SIZE - pad - 3, CELL_SIZE - pad * 2, 3);
  } else if (cell === DEAD1 || cell === DEAD2) {
    ctx.fillStyle = cell === DEAD1 ? '#3d1a1a' : '#1a1a3d';
    ctx.fillRect(x + pad, y + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2);
    ctx.strokeStyle = cell === DEAD1 ? '#6d3333' : '#33336d';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 4); ctx.lineTo(x + CELL_SIZE - 4, y + CELL_SIZE - 4);
    ctx.moveTo(x + CELL_SIZE - 4, y + 4); ctx.lineTo(x + 4, y + CELL_SIZE - 4);
    ctx.stroke();
  }
}

function renderPreview(player) {
  const canvas = player === P1 ? previewP1 : previewP2;
  const ctx = player === P1 ? prevCtx1 : prevCtx2;
  ctx.clearRect(0, 0, 90, 90);
  const piece = pieces[player];
  if (!piece) return;
  const rot = player === currentPlayer ? rotation : 0;
  const cells = getRotatedCells(piece.cells, rot);
  const bounds = getPieceBounds(cells);
  const cellSz = Math.min(20, Math.floor(72 / Math.max(bounds.rows, bounds.cols)));
  const offX = (90 - bounds.cols * cellSz) / 2;
  const offY = (90 - bounds.rows * cellSz) / 2;
  const color = player === P1 ? P1_COLOR : P2_COLOR;
  for (const [r, c] of cells) {
    ctx.fillStyle = color;
    ctx.fillRect(offX + c * cellSz + 1, offY + r * cellSz + 1, cellSz - 2, cellSz - 2);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(offX + c * cellSz + 1, offY + r * cellSz + 1, cellSz - 2, 2);
  }
}

function updatePanels() {
  document.getElementById('scoreP1').textContent = countPieces(P1);
  document.getElementById('scoreP2').textContent = countPieces(P2);
  document.getElementById('panelP1').classList.toggle('active', currentPlayer === P1 && gameActive);
  document.getElementById('panelP2').classList.toggle('active', currentPlayer === P2 && gameActive);
  renderPreview(P1);
  renderPreview(P2);
}

function setStatus(msg) {

}

function playerName(p) {
  if (p === P1) return '玩家1(蓝)';
  return gameMode === 'pvai' ? 'AI(紫)' : '玩家2(紫)';
