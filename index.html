<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俄罗斯方块棋 Tetris Weiqi</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
</head>
<body>

<div class="header">
  <h1>俄罗斯方块棋</h1>
  <div class="subtitle">Tetris meets Weiqi</div>
</div>

<div class="top-bar">
  <button class="mode-btn selected" id="btnPvAI" onclick="setMode('pvai')">人机</button>
  <button class="mode-btn" id="btnPvP" onclick="setMode('pvp')">双人</button>
  <label>棋盘</label>
  <select id="boardSizeSelect" onchange="changeBoardSize()">
    <option value="10" selected>10x10</option>
    <option value="13">13x13</option>
    <option value="15">15x15</option>
  </select>
  <label>AI</label>
  <select id="aiLevelSelect">
    <option value="1">简单</option>
    <option value="2" selected>普通</option>
    <option value="3">困难</option>
    <option value="4">神经网络</option>
    <option value="5">神经网络+MCTS</option>
  </select>
  <span id="mctsSliderWrap" style="display:none;">
    <input type="range" id="mctsSimsSlider" min="10" max="200" step="10" value="40"
      style="width:80px;vertical-align:middle;" oninput="updateMctsLabel()">
    <label id="mctsSimsLabel" style="font-size:12px;color:#aaa;">40次</label>
  </span>
  <label>先手</label>
  <select id="firstPlayerSelect">
    <option value="random" selected>随机</option>
    <option value="p1">玩家1</option>
    <option value="p2">玩家2</option>
  </select>
  <label>贴目</label>
  <input type="number" id="komiInput" step="0.5" value="0" min="-20" max="20"
    style="width:50px;" onchange="komi = parseFloat(this.value) || 0;">
  <button class="primary" onclick="startGame()">开始游戏</button>
  <button class="rotate-btn" onclick="rotatePiece()">旋转(R)</button>
  <button class="skip-btn" onclick="skipTurn()">跳过</button>
  <button onclick="saveGame()" style="background:#1a3a1a;border:1px solid #4caf50;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;">存档</button>
  <button onclick="loadGame()" style="background:#1a2a3a;border:1px solid #42a5f5;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;">读档</button>
  <button onclick="document.getElementById('replayFileInput').click()" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;">回放棋谱</button>
  <input type="file" id="replayFileInput" accept=".txt" style="display:none;" onchange="loadReplayFile(event)">
  <button id="btnSound" onclick="toggleSound()" style="background:#1a1a2e;border:1px solid #555;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:16px;">🔊</button>
  <button id="btnBgm" onclick="toggleBgm()" style="background:#1a1a2e;border:1px solid #555;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:16px;">🎵</button>
</div>

<div class="status-bar" id="statusBar">点击"开始游戏"开始</div>

<div class="game-area">
  <div class="panel p1" id="panelP1">
    <h2>玩家 1 (蓝)</h2>
    <div class="score-row">
      <span class="score-label">方块数</span>
      <span class="score-value" id="scoreP1">0</span>
    </div>
    <div class="score-label">当前方块</div>
    <div class="preview-box"><canvas class="preview-canvas" id="previewP1" width="90" height="90"></canvas></div>
  </div>

  <div class="board-wrapper">
    <canvas id="boardCanvas"></canvas>
  </div>

  <div class="panel p2" id="panelP2">
    <h2>玩家 2 (紫)</h2>
    <div class="score-row">
      <span class="score-label">方块数</span>
      <span class="score-value" id="scoreP2">0</span>
    </div>
    <div class="score-label">当前方块</div>
    <div class="preview-box"><canvas class="preview-canvas" id="previewP2" width="90" height="90"></canvas></div>
  </div>
</div>

<div class="footer">
  <div class="legend-item"><div class="legend-swatch" style="background:#4fc3f7"></div> 玩家1</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#e040fb"></div> 玩家2</div>
  <span class="desktop-hint">鼠标预览 | 点击落子 | R/右键旋转 | 方向键微调</span>
  <span class="mobile-hint">触屏拖动预览 | 松手落子 | 点击方块预览旋转</span>
</div>

<!-- Mobile touch controls -->
<div class="mobile-controls" id="mobileControls">
  <button class="mobile-btn" ontouchstart="movePieceDir(-1,0)" onclick="movePieceDir(-1,0)">&#9650;</button>
  <div class="mobile-row">
    <button class="mobile-btn" ontouchstart="movePieceDir(0,-1)" onclick="movePieceDir(0,-1)">&#9664;</button>
    <button class="mobile-btn place-btn" ontouchstart="confirmPlace()" onclick="confirmPlace()">落子</button>
    <button class="mobile-btn" ontouchstart="movePieceDir(0,1)" onclick="movePieceDir(0,1)">&#9654;</button>
  </div>
  <button class="mobile-btn" ontouchstart="movePieceDir(1,0)" onclick="movePieceDir(1,0)">&#9660;</button>
  <div class="mobile-row" style="margin-top:6px">
    <button class="mobile-btn rotate-m" ontouchstart="rotatePiece()" onclick="rotatePiece()">旋转</button>
    <button class="mobile-btn skip-m" ontouchstart="skipTurn()" onclick="skipTurn()">跳过</button>
  </div>
</div>

<div class="overlay" id="gameOverOverlay">
  <div class="dialog">
    <h2 id="gameOverTitle">游戏结束</h2>
    <div class="result" id="gameOverResult"></div>
    <div class="detail" id="gameOverDetail"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="primary" onclick="exportGameRecord()">导出棋谱</button>
      <button class="primary" onclick="closeOverlay(); startReplay();">回放</button>
      <button class="primary" onclick="closeOverlay(); startGame();">再来一局</button>
    </div>
  </div>
</div>

<!-- Replay control bar -->
<div id="replayBar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;border-top:2px solid #7c4dff;padding:8px 12px;z-index:200;text-align:center;">
  <button onclick="replayStep(-Infinity)" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">⏮</button>
  <button onclick="replayStep(-1)" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">◀</button>
  <button id="replayPlayBtn" onclick="toggleReplayAuto()" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">▶</button>
  <button onclick="replayStep(1)" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">▶</button>
  <button onclick="replayStep(Infinity)" style="background:#2d1b4e;border:1px solid #7c4dff;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;">⏭</button>
  <input type="range" id="replaySlider" min="0" max="1" value="0" style="width:120px;vertical-align:middle;margin:0 8px;" oninput="replaySeek(this.value)">
  <span id="replayInfo" style="color:#aaa;font-size:12px;">0/0</span>
  <button onclick="exitReplay()" style="background:#3d1a1a;border:1px solid #e57373;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;margin-left:12px;">退出回放</button>
</div>

<script src="js/audio.js"></script>
<script src="js/game-logic.js"></script>
<script src="js/ai-onnx.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
